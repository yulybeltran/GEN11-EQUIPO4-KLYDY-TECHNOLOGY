<body>

  <!-- ─────────────────────────────────────────────────────────
       DECORACIÓN GLOBAL — L-shapes neón en esquinas
       Heredado de nav-footer.css · position: fixed · z-index: 0
  ──────────────────────────────────────────────────────────── -->
  <div class="neon-lines" aria-hidden="true">
    <svg viewBox="0 0 1440 900" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">

      <!-- Cyan — esquina derecha inferior -->
      <polyline points="1380,900 1380,580 1440,580" fill="none" stroke="#00f0c8" stroke-width="2" opacity="0.6" />
      <polyline points="1380,900 1380,580 1440,580" fill="none" stroke="#00f0c8" stroke-width="18" opacity="0.07" />

      <!-- Purple — esquina izquierda inferior -->
      <polyline points="60,900 60,620 0,620" fill="none" stroke="#bc4fe8" stroke-width="2" opacity="0.55" />
      <polyline points="60,900 60,620 0,620" fill="none" stroke="#bc4fe8" stroke-width="18" opacity="0.07" />

      <!-- Pink — esquina derecha superior -->
      <polyline points="1440,190 1360,190 1360,70" fill="none" stroke="#ff3cac" stroke-width="1.5" opacity="0.50" />
      <polyline points="1440,190 1360,190 1360,70" fill="none" stroke="#ff3cac" stroke-width="14" opacity="0.06" />

      <!-- Blue — esquina izquierda superior -->
      <polyline points="0,180 80,180 80,70" fill="none" stroke="#0abde3" stroke-width="1.5" opacity="0.50" />
      <polyline points="0,180 80,180 80,70" fill="none" stroke="#0abde3" stroke-width="14" opacity="0.06" />

    </svg>
  </div>




  <main>

    <div class="container py-5">
    <h1 class="mb-4 text-center">Catálogo de Productos</h1>

    <!-- Contenedor donde se pintan -->
    <div id="catalogo" class="row g-4"></div>

    <!-- Mensaje vacío -->
    <p id="mensajeVacio" class="text-center mt-5 d-none">
      No hay productos aún
    </p>
  </div>

  </main>




  <!-- Bootstrap  -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"></script>




  <script src="../JS/catalogo-karen.js"></script>

</body>

</html>
