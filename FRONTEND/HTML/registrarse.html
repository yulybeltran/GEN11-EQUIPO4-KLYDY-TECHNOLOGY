<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KLYDY Technology</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Orbitron:wght@700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
<link rel="icon" type="image/png" sizes="16x16" href="images/klydy-favicon-32.png">
<link rel="stylesheet" href="../CSS/registrarse.css">
<link rel="stylesheet" href="../CSS/nav-footer.css">
</head>
<body>


<div class="neon-lines">
  <svg viewBox="0 0 1440 900" preserveAspectRatio="none"
       xmlns="http://www.w3.org/2000/svg">

    <!-- Cyan — esquina derecha inferior -->
    <polyline points="1380,900 1380,580 1440,580"
      fill="none" stroke="#00f0c8" stroke-width="2"  opacity="0.6"/>
    <polyline points="1380,900 1380,580 1440,580"
      fill="none" stroke="#00f0c8" stroke-width="18" opacity="0.07"/>

    <!-- Purple — esquina izquierda inferior -->
    <polyline points="60,900 60,620 0,620"
      fill="none" stroke="#bc4fe8" stroke-width="2"  opacity="0.55"/>
    <polyline points="60,900 60,620 0,620"
      fill="none" stroke="#bc4fe8" stroke-width="18" opacity="0.07"/>

    <!-- Pink — esquina derecha superior (bajada 70px por el navbar) -->
    <polyline points="1440,190 1360,190 1360,70"
      fill="none" stroke="#ff3cac" stroke-width="1.5" opacity="0.50"/>
    <polyline points="1440,190 1360,190 1360,70"
      fill="none" stroke="#ff3cac" stroke-width="14"  opacity="0.06"/>

    <!-- Blue — esquina izquierda superior (bajada 70px por el navbar) -->
    <polyline points="0,180 80,180 80,70"
      fill="none" stroke="#0abde3" stroke-width="1.5" opacity="0.50"/>
    <polyline points="0,180 80,180 80,70"
      fill="none" stroke="#0abde3" stroke-width="14"  opacity="0.06"/>

  </svg>
</div>

<div class="register-container">

    <div class="register-card">

        <h2 class="register-title">Crear Cuenta</h2>
        <p class="register-sub">Unete a Klydy Technology</p>

        <form id="registerForm">
            <div class="form-group">
                <label>Nombre completo</label>
                <input type="text" id="nombre" placeholder="Nombre completo">
            </div>

            <div class="form-group">
                <label>Numero de Identificacion</label>
                <input type="number" id="identificacion" placeholder="Identificacion">
            </div>

            <div class="form-group">
                <label>Correo electronico</label>
                <input type="email" id="correo" placeholder="tu@email.com">
            </div>

            <div class="form-group">
                <label>Telefono</label>
                <input type="tel" id="telefono" placeholder="3000000000">
            </div>

            <div class="form-group">
                <label>Contraseña</label>
                <input type="password" id="password" placeholder="**********">
            </div>

            <div class="form-group">
                <label>Confirmar contraseña</label>
                <input type="password" id="confirmPassword" placeholder="**********">
            </div>

            <button type="submit" class="btn-register">Registrarse</button>

            <p class="login-link">
                ¿Ya tienes cuenta? <a href="#">Iniciar sesion</a>
            </p>
        </form>
    </div>
</div>

<script src="../JS/registrarse.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
